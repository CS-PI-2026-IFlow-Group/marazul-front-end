<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marazul</title>
    <link
      href="/assets/bootstrap-5.3.8-dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Bitcount+Prop+Double:wght@100..900&family=Bitcount:wght@100..900&family=Mrs+Saint+Delafield&family=Roboto:ital,wght@0,100..900;1,100..900&family=VT323&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header></header>
    <main>
      <div class="hero-wrapper-overflow">
        <section class="hero">
          <div class="wellcome-page-wrapper">
            <div class="container-image-text">
              <div class="text-content-wellcome">
                <a
                  class="btn-location glass-effect"
                  data-i18n="btn-location-text"
                >
                  <img
                    class="btn-icon"
                    src="assets/icons/mao-pin.svg"
                    alt="icone de gps"
                    data-i18n="img-icon-gps"
                  />
                  Viagens inesquecíveis pelo Brasil
                </a>
                <div class="cursive-wellcome-text">
                  <h1 data-i18n="cursive-wellcome-text">Descubra o Brasil</h1>
                </div>
                <div class="normal-letters">
                  <h1 data-i18n="normal-letters-text">com a Marazul</h1>
                </div>
                <p class="description" data-i18n="description-text">
                  Conforto, segurança e as melhores experiências de turismo
                  rodoviário para você e sua família.
                </p>
              </div>
              <div
                class="container-btn-right d-flex flex-column flex-sm-row justify-content-center align-items-center gap-4 mt-4"
              >
                <a
                  class="btn btn-primary btn-lg"
                  id="btn-budget"
                  data-i18n="btn-primary-text"
                  href="./pages/contact.html"
                >
                  Solicitar orçamento
                  <img
                    class="btn-icon"
                    src="assets/icons/arrow-right.svg"
                    alt="símbolo flecha para a direita"
                    data-i18n="img-icon-arrow"
                  />
                </a>
                <a
                  id="btn-fleet"
                  class="btn btn-outline-light btn-lg glass-effect hover-transparent"
                  data-i18n="btn-secoundary-text"
                  href="#fleet-section"
                  >Conheça nossa frota</a
                >
              </div>
            </div>
          </div>
          <img
            src="assets/images/image-home.jpg"
            class="image-background"
            alt="foto praia de ilha paradisíaca"
            data-i18n="img-home-beach"
          />
        </section>
      </div>
      <section class="about"></section>
      <section class="fleet" id="fleet-section"></section>
      <section class="travel-tips"></section>
      <section class="feedbacks"></section>
      <section class="contact"></section>
      <section class="useful-links"></section>
    </main>
    <footer></footer>
    <script src="/assets/popper2.11.8/popper.min.js"></script>
    <script src="/assets/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
