<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marazul</title>
    <link
      href="/assets/bootstrap-5.3.8-dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/main.css" />
  </head>

  <body>
    <header></header>
    <main>
      <section class="hero"></section>
      <section class="about py-5">
        <div class="container py-lg-4">
          <div class="row align-items-center gy-5 gx-lg-5">
            <div class="col-lg-6">
              <div class="position-relative d-inline-block w-100">
                <img
                  src="assets/images/bus5.jpeg"
                  alt="Imagem de um ônibus com a logo da Marazul"
                  class="img-fluid w-100 object-fit-cover shadow-sm about-img"
                />

                <div
                  class="experience-badge position-absolute text-center shadow"
                >
                  <span class="badge-number d-block">50+</span>
                  <span class="badge-text" data-i18n="index.badge-text"
                    >anos no mercado</span
                  >
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
      <section class="fleet"></section>
      <section class="travel-tips"></section>
      <section class="feedbacks"></section>
      <section class="contact"></section>
      <section class="useful-links"></section>
    </main>
    <footer></footer>
    <script src="/assets/popper2.11.8/popper.min.js"></script>
    <script src="/assets/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
