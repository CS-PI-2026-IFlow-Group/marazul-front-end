<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="about.page-title">Sobre Nós - Marazul</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/about.css"> </head>
<body>

<main>
    <section class="about-hero">
        <div class="hero-content">
            <h1 data-i18n="about.hero-title">Nossa História</h1>
            <p data-i18n="about.hero-subtitle">Conheça a trajetória da Marazul e nosso compromisso com você.</p>
        </div>
    </section>

    <section class="about-gallery">
        <div class="carousel-container">
            <article class="carousel-item">
                <img src="../assets/images/about/" alt="Foto da fundação da Marazul" loading="lazy">
            </article>
            <article class="carousel-item">
                <img src="../assets/images/about/" alt="Equipe Marazul trabalhando" loading="lazy">
            </article>
            <article class="carousel-item">
                <img src="../assets/images/about/" alt="Nossa frota de veículos" loading="lazy">
            </article>
        </div>
    </section>

    <section class="about-values">
        <div class="values-grid">
            <div class="value-card">
                <h2 data-i18n="about.mission-title">Missão</h2>
                <p data-i18n="about.mission-text">Entregar excelência e segurança em cada projeto.</p>
            </div>
            <div class="value-card">
                <h2 data-i18n="about.vision-title">Visão</h2>
                <p data-i18n="about.vision-text">Ser referência nacional em nosso setor até 2030.</p>
            </div>
            <div class="value-card">
                <h2 data-i18n="about.values-title">Valores</h2>
                <p data-i18n="about.values-text">Ética, Inovação e Transparência.</p>
            </div>
        </div>
    </section>
</main>

<script src="../js/main.js" type="module"></script>
</body>
</html>
